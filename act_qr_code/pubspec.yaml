name: act_qr_code
description: This package contains widgets linked to QR code

publish_to: none

# This package supports all platforms listed below.
platforms:
  android:
  ios:
  linux:
  macos:
  web:
  windows:

environment:
  sdk: ^3.11.1
  flutter: ">=3.29.0"

dependencies:
  flutter:
    sdk: flutter

  app_settings: ^6.1.1

  barcode: ^2.2.9

  # Help to implement value based equality without explicit override
  equatable: ^2.0.7

  flutter_bloc: ^9.1.1

  flutter_svg: ^2.3.0

  permission_handler: ^12.0.0+1

  qr_code_scanner: ^1.0.1

  act_dart_utility:
    path: ../act_dart_utility

  act_global_manager:
    path: ../act_global_manager

dev_dependencies:
  flutter_test:
    sdk: flutter

  # Recommended lints for Flutter apps
  flutter_lints: ^6.0.0
