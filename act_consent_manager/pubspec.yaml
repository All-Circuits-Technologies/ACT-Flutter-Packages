name: act_consent_manager
description: "This package contains useful methods and classes to manage user consents."
publish_to: none

# This package supports all platforms listed below.
platforms:
  android:
  ios:
  linux:
  macos:
  windows:

environment:
  sdk: ^3.11.1
  flutter: ">=3.29.0"

dependencies:
  flutter:
    sdk: flutter

  equatable: ^2.0.7

  # Create widget from markdown string
  # TODO(brolandeau): the package is discontinued, need to find another one
  flutter_markdown: ^0.7.7+1

  mutex: ^3.1.0

  # Contains dart result class to return status and value of a request
  act_dart_result:
    path: ../act_dart_result

  # Utility
  act_dart_utility:
    path: ../act_dart_utility

  # Global manager
  act_global_manager:
    path: ../act_global_manager

  # Internet access
  act_internet_connectivity_manager:
    path: ../act_internet_connectivity_manager

  act_intl:
    path: ../act_intl

  # Easily create managers
  act_life_cycle:
    path: ../act_life_cycle

  # Loggers
  act_logger_manager:
    path: ../act_logger_manager

  # Authentification lib
  act_shared_auth:
    path: ../act_shared_auth

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
