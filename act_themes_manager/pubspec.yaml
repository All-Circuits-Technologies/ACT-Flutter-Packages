name: act_themes_manager
description: This package contains the manager for the app themes
publish_to: none

environment:
  sdk: ^3.11.5
  flutter: ">=3.29.0"

dependencies:
  flutter:
    sdk: flutter

  # Help to implement value based equality without explicit override
  equatable: ^2.0.7

  # Implement the BLoC (Business Logic Component) design pattern
  flutter_bloc: ^9.1.1

  act_config_manager:
    path: ../act_config_manager

  act_dart_utility:
    path: ../act_dart_utility

  act_dart_value_keeper:
    path: ../act_dart_value_keeper

  act_flutter_utility:
    path: ../act_flutter_utility

  # Default global manager
  act_global_manager:
    path: ../act_global_manager

  act_life_cycle:
    path: ../act_life_cycle

  act_local_storage_manager:
    path: ../act_local_storage_manager

  act_logger_manager:
    path: ../act_logger_manager

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
